name: Power BI CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      project_name:
        description: Project folder/name to deploy. Use all to deploy every project.
        required: true
        default: all
        type: string
      name_conflict:
        description: Power BI import conflict behavior
        required: true
        default: CreateOrOverwrite
        type: choice
        options:
          - CreateOrOverwrite
          - Overwrite
          - Ignore
          - Abort
      deploy_model:
        description: Deploy BIM with Tabular Editor 2
        required: true
        default: true
        type: boolean
      publish_report:
        description: Publish PBIX with Power BI REST API
        required: true
        default: true
        type: boolean

jobs:
  detect_projects:
    name: Detect projects to deploy
    runs-on: [self-hosted, Windows, X64]
    outputs:
      projects: ${{ steps.detect.outputs.projects }}
      has_projects: ${{ steps.detect.outputs.has_projects }}
      project_count: ${{ steps.detect.outputs.project_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed projects
        id: detect
        shell: pwsh
        run: |
          $projectName = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.project_name }}" } else { "all" }
          $projectsJson = ./scripts/Resolve-ProjectsForDeployment.ps1 `
            -EventName "${{ github.event_name }}" `
            -ProjectName $projectName `
            -BeforeSha "${{ github.event.before }}" `
            -CurrentSha "${{ github.sha }}" | Select-Object -Last 1

          $projects = @($projectsJson | ConvertFrom-Json)
          $count = $projects.Count
          $hasProjects = if ($count -gt 0) { "true" } else { "false" }

          "projects=$projectsJson" >> $env:GITHUB_OUTPUT
          "project_count=$count" >> $env:GITHUB_OUTPUT
          "has_projects=$hasProjects" >> $env:GITHUB_OUTPUT

          if ($count -eq 0) {
            Write-Host "No project folders changed. Nothing to deploy."
          }
          else {
            Write-Host "Projects to deploy:"
            $projects | ForEach-Object { Write-Host " - $($_.name)" }
          }

  deploy_project:
    name: Deploy ${{ matrix.project.name }}
    needs: detect_projects
    if: ${{ needs.detect_projects.outputs.has_projects == 'true' }}
    runs-on: [self-hosted, Windows, X64]
    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.detect_projects.outputs.projects) }}
    env:
      PBI_TENANT_ID: ${{ secrets.PBI_TENANT_ID }}
      PBI_CLIENT_ID: ${{ secrets.PBI_CLIENT_ID }}
      PBI_CLIENT_SECRET: ${{ secrets.PBI_CLIENT_SECRET }}
      PBI_WORKSPACE_ID: ${{ secrets.PBI_WORKSPACE_ID }}
      PBI_XMLA_SERVER: ${{ vars.PBI_XMLA_SERVER }}
      TE2_PATH: ${{ vars.TE2_PATH }}
      NAME_CONFLICT: ${{ github.event_name == 'workflow_dispatch' && inputs.name_conflict || 'CreateOrOverwrite' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify configuration
        shell: pwsh
        run: |
          $required = @(
            "PBI_TENANT_ID",
            "PBI_CLIENT_ID",
            "PBI_CLIENT_SECRET",
            "PBI_WORKSPACE_ID",
            "PBI_XMLA_SERVER",
            "TE2_PATH"
          )

          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Missing required GitHub secret/variable: $name"
            }
          }

          if (-not (Test-Path -LiteralPath $env:TE2_PATH -PathType Leaf)) {
            throw "Tabular Editor 2 not found at: $env:TE2_PATH"
          }

          Write-Host "Target XMLA server: $env:PBI_XMLA_SERVER"
          Write-Host "Tabular Editor 2 path: $env:TE2_PATH"
          Write-Host "Project: ${{ matrix.project.name }}"

      - name: Deploy BIM
        if: ${{ github.event_name == 'push' || inputs.deploy_model }}
        shell: pwsh
        run: |
          ./scripts/Deploy-BimWithTabularEditor.ps1 `
            -ModelFile "${{ matrix.project.modelFile }}" `
            -ModelName "${{ matrix.project.modelName }}"

      - name: Verify Python
        if: ${{ github.event_name == 'push' || inputs.publish_report }}
        shell: pwsh
        run: |
          python --version

      - name: Publish PBIX
        if: ${{ github.event_name == 'push' || inputs.publish_report }}
        shell: pwsh
        run: |
          python ./scripts/Publish-PbixReport.py `
            --pbix-file "${{ matrix.project.pbixFile }}" `
            --report-display-name "${{ matrix.project.reportDisplayName }}" `
            --name-conflict "$env:NAME_CONFLICT" `
            --semantic-model-name "${{ matrix.project.modelName }}"
